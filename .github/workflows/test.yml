name: Tests

on:
  pull_request:
    branches: [ master, develop, main ]
  workflow_dispatch:
    inputs:
      java_version:
        description: 'JDK version to test (21 / 25 / 26 / combinations). 26 verifies JEP 504 (JApplet removal) compatibility.'
        required: false
        default: '21'
        type: choice
        options:
          - '21'
          - '25'
          - '26'
          - '21,25'
          - '21,26'
          - '21,25,26'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ${{ fromJSON(github.event_name == 'workflow_dispatch' && (inputs.java_version == '21,25' && '["21","25"]' || inputs.java_version == '21,26' && '["21","26"]' || inputs.java_version == '21,25,26' && '["21","25","26"]' || format('["{0}"]', inputs.java_version)) || '["21"]') }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      # Gradle 9.2.1 の launcher JVM は JDK 21 までしか対応しない。
      # matrix 版を toolchain として使うため JDK 21 を launcher に残しつつ matrix 版を追加 install。
      # multi-line java-version は最後の項目を JAVA_HOME にするので 21 を最後に書く。
      - name: Set up JDK (toolchain ${{ matrix.java-version }} + launcher 21)
        uses: actions/setup-java@v4
        with:
          java-version: |
            ${{ matrix.java-version }}
            21
          distribution: 'temurin'
          cache: gradle
          check-latest: true

      - name: Make gradlew executable
        run: chmod +x gradlew

      # -PjavaToolchainVersion: compileJava 用 toolchain のバージョン
      # -Dorg.gradle.java.installations.fromEnv: setup-java が立てる JAVA_HOME_<NN>_X64 を
      # Gradle の toolchain 検索パスに登録 (Gradle 標準スキャナは /opt/hostedtoolcache を見ない)
      # JDK 21 (LTS) は全テスト + compile、JDK 25/26 は compile validation のみ。
      # 後者で test 実行をスキップする理由: JUnit 4.13.2 が JDK 26 toolchain で
      # InvalidTestClassError を発生させる (リフレクション挙動変化)。
      # 0C-1 (JUnit 5 移行) で根本解決予定。docs/modernization-plan.md 参照。
      - name: Run tests (JDK 21) or compile validation (JDK 25/26)
        run: |
          if [ "${{ matrix.java-version }}" = "21" ]; then
            ./gradlew test --info \
              -PjavaToolchainVersion=${{ matrix.java-version }} \
              -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_${{ matrix.java-version }}_X64,JAVA_HOME_21_X64
          else
            ./gradlew compileJava \
              -PjavaToolchainVersion=${{ matrix.java-version }} \
              -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_${{ matrix.java-version }}_X64,JAVA_HOME_21_X64
          fi

      - name: Run syntax checks
        if: matrix.java-version == '21'
        run: |
          ./gradlew check \
            -PjavaToolchainVersion=${{ matrix.java-version }} \
            -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_${{ matrix.java-version }}_X64,JAVA_HOME_21_X64

      - name: Build jar
        if: matrix.java-version == '21'
        run: |
          ./gradlew jar \
            -PjavaToolchainVersion=${{ matrix.java-version }} \
            -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_${{ matrix.java-version }}_X64,JAVA_HOME_21_X64

      - name: Check test results
        if: always() && matrix.java-version == '21'
        run: |
          echo "Checking for test result files..."
          find build/test-results -type f -name "*.xml" 2>/dev/null || echo "No XML files found"
          ls -la build/test-results/test/ 2>/dev/null || echo "test-results directory not found"

      - name: Upload test results
        if: always() && matrix.java-version == '21'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk-${{ matrix.java-version }}
          path: build/test-results/test/

      - name: Publish test results
        if: always() && matrix.java-version == '21'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/test-results/test/TEST-*.xml
          check_name: Test Results (JDK ${{ matrix.java-version }})
          compare_to_earlier_commit: false
          github_token: ${{ secrets.GITHUB_TOKEN }}
