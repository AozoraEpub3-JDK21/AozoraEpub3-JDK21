name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew --no-daemon clean test

      - name: Build distribution packages
        run: ./gradlew --no-daemon dist

      - name: Identify distribution files
        id: dist
        run: |
          set -e
          ZIP_FILE=$(find build/distributions -name "AozoraEpub3*.zip" -type f | head -1)
          TAR_FILE=$(find build/distributions -name "AozoraEpub3*.tar.gz" -type f | head -1)
          JAR_FILE=$(find build/libs -name "AozoraEpub3*.jar" -type f | head -1)
          echo "zip=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "tar=$TAR_FILE" >> "$GITHUB_OUTPUT"
          echo "jar=$JAR_FILE" >> "$GITHUB_OUTPUT"
          echo "Found ZIP: $ZIP_FILE"
          echo "Found TAR: $TAR_FILE"
          echo "Found JAR: $JAR_FILE"

      - name: Generate SHA-256 checksums
        run: |
          set -e
          cd build/distributions
          sha256sum *.zip *.tar.gz > SHA256SUMS 2>/dev/null || true
          if [ -f "../libs/"*.jar ]; then
            (cd ../libs && sha256sum *.jar) >> SHA256SUMS
          fi
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Attest build provenance (ZIP)
        if: steps.dist.outputs.zip != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.dist.outputs.zip }}

      - name: Attest build provenance (TAR)
        if: steps.dist.outputs.tar != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.dist.outputs.tar }}

      - name: Attest build provenance (JAR)
        if: steps.dist.outputs.jar != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.dist.outputs.jar }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/distributions/*.zip
            build/distributions/*.tar.gz
            build/distributions/SHA256SUMS
            build/libs/AozoraEpub3*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
